<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>友メシ — 友達のおすすめレストランメモ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --orange: #F07A30;
    --orange-light: #FFF0E6;
    --teal: #17A2B8;
    --green: #5DBB63;
    --red: #E06C75;
    --bg: #F5F3EF;
    --card: #FFFFFF;
    --text: #1E1E1E;
    --muted: #888;
    --border: #E8E4DE;
    --radius: 14px;
    --friend-colors: #F6C90E, #5DBB63, #17A2B8, #E06C75, #9B59B6, #F07A30;
  }

  body {
    font-family: 'Hiragino Sans', 'Meiryo', 'YuGothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    background: var(--card);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 17px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; font-family: inherit;
    font-weight: 700; border-radius: 22px; padding: 9px 18px;
    font-size: 14px; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.96); opacity: .85; }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-teal    { background: var(--teal);   color: #fff; }
  .btn-green   { background: var(--green);  color: #fff; }
  .btn-red     { background: var(--red);    color: #fff; }
  .btn-gray    { background: #999;          color: #fff; }
  .btn-full    { width: 100%; border-radius: var(--radius); padding: 13px; font-size: 15px; }
  .btn-sm      { padding: 6px 13px; font-size: 13px; border-radius: 10px; }
  .btn-back    { background: none; border: none; color: var(--orange); font-size: 15px; font-weight: 600; cursor: pointer; padding: 4px 10px 4px 0; font-family: inherit; }

  /* CARDS */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 13px 15px;
    border-left: 4px solid #ccc;
    box-shadow: 0 1px 5px rgba(0,0,0,.06);
    cursor: pointer;
    transition: box-shadow .15s;
  }
  .card:active { box-shadow: 0 2px 10px rgba(0,0,0,.12); }

  /* FILTERS */
  .filter-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-row { display: flex; gap: 8px; }
  .search-input, .filter-select, .form-input, .form-textarea {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 13px;
    font-size: 14px;
    font-family: inherit;
    background: #FAFAF8;
    color: var(--text);
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }
  .filter-select { width: auto; flex: 1; }
  .form-input:focus, .form-textarea:focus, .search-input:focus {
    outline: none; border-color: var(--orange);
  }
  .form-textarea { min-height: 80px; resize: vertical; }

  /* FRIEND TAG */
  .friend-tag {
    display: inline-block;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    padding: 2px 9px;
  }

  /* BADGE */
  .badge {
    color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 10px; padding: 3px 9px; white-space: nowrap;
  }

  /* LABEL */
  .form-label {
    font-size: 13px; font-weight: 700; color: #555;
    margin-bottom: 5px; margin-top: 16px; display: block;
  }

  /* CHIP */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    border: 1.5px solid var(--border); border-radius: 16px;
    padding: 5px 13px; font-size: 13px; cursor: pointer;
    background: #FAFAF8; font-family: inherit;
    transition: background .12s, border-color .12s;
  }
  .chip.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  /* SUGGESTIONS */
  .sug-wrap { position: relative; }
  .sug-box {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #fff; border: 1.5px solid var(--border); border-radius: 12px;
    z-index: 200; box-shadow: 0 6px 20px rgba(0,0,0,.13);
    max-height: 260px; overflow-y: auto;
  }
  .sug-item { padding: 11px 15px; cursor: pointer; border-bottom: 1px solid #F0EDE8; }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:active { background: var(--orange-light); }
  .sug-name { font-weight: 700; font-size: 14px; }
  .sug-addr { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sug-cat  { font-size: 11px; color: #bbb; margin-top: 1px; }

  /* STATUS */
  .api-status { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .addr-confirm { background: #E8F8F2; border-radius: 9px; padding: 8px 12px; margin-top: 7px; font-size: 13px; color: #2d7a6a; }
  .err-box { background: #FFF0F0; border: 1px solid #F5B8BC; border-radius: 9px; padding: 9px 13px; font-size: 13px; color: #b83232; margin-top: 7px; }

  /* LIST */
  .list { padding: 13px 16px; display: flex; flex-direction: column; gap: 11px; }
  .card-title { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub   { font-size: 12px; color: #666; margin-top: 3px; }
  .card-addr  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-row   { display: flex; justify-content: space-between; align-items: center; margin-top: 9px; }
  .card-cat   { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .card-dist  { font-size: 11px; color: var(--teal); margin-top: 2px; }

  /* EMPTY */
  .empty { text-align: center; color: var(--muted); padding: 56px 24px; font-size: 15px; line-height: 1.7; }

  /* DETAIL */
  .detail-card { margin: 16px; border-radius: var(--radius); padding: 18px; border: 2px solid #ccc; background: #fff; }
  .detail-name { font-size: 22px; font-weight: 700; margin-top: 3px; }
  .detail-section { margin-top: 15px; }
  .detail-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .detail-value { font-size: 15px; }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }

  /* MAP */
  .map-frame { margin: 0 16px 16px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.10); }
  .map-open-btn {
    display: inline-block; background: var(--teal); color: #fff;
    border-radius: 9px; padding: 5px 11px; font-size: 12px;
    text-decoration: none; font-weight: 700; white-space: nowrap; flex-shrink: 0;
  }

  /* ACTIONS */
  .action-row { padding: 0 16px 28px; display: flex; gap: 10px; }

  /* FORM */
  .form-body { padding: 4px 16px 32px; }

  /* SCROLL */
  .scroll-area { flex: 1; overflow-y: auto; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1E1E1E; color: #fff; padding: 10px 20px; border-radius: 22px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
// ── SUPABASE INITIALIZATION ──
const SUPABASE_URL = 'https://qvrkarxkwqjfopbwgavs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2cmthcnhrd3FqZm9wYndnYXZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzMzODQsImV4cCI6MjA5NzAwOTM4NH0.wkTLeiCJMkQJ8t87osAZwxUUkgZBeTOgudb5WD4Kmg4';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FRIEND_COLORS = ['#F6C90E','#5DBB63','#17A2B8','#E06C75','#9B59B6','#F07A30'];
const CATEGORIES = ['🍜 ラーメン・麺類','🍣 寿司・魚','🍖 肉料理','🍕 洋食','🍱 和食','☕ カフェ・スイーツ','🌏 エスニック','🍺 居酒屋','その他'];

// ── STATE ──
let state = {
  view: 'list',
  memos: [],
  friends: [],
  filter: { friend: '', visited: 'all', search: '' },
  selected: null,
  form: { name:'', friend:'', friendNew:'', category:'その他', menu:'', note:'', address:'', lat:null, lng:null, visited:false },
  suggestions: [],
  showSug: false,
  apiStatus: '',
  apiError: '',
  userLL: null,
  nearby: [],
  nearbyLoading: false,
  nearbyError: '',
  isLoadingData: true
};
let sugTimer = null;

// ── SUPABASE DATABASE ACTIONS ──
async function loadMemos() {
  state.isLoadingData = true;
  render();
  // Supabaseのmemosテーブルから全データを取得 (ID降順で新しい順に)
  const { data, error } = await supabase.from('memos').select('*').order('id', { ascending: false });
  
  if (error) {
    console.error('Supabase fetch error:', error);
    toast('データの読み込みに失敗しました');
  } else if (data) {
    state.memos = data;
    state.friends = [...new Set(state.memos.map(m => m.friend).filter(Boolean))];
  }
  state.isLoadingData = false;
  render();
}

async function addMemo() {
  const friend = state.form.friendNew.trim() || state.form.friend;
  if (!state.form.name.trim() || !friend) return;
  
  // idはSupabaseが自動で割り振るので送らない
  const memo = {
    name: state.form.name.trim(), 
    friend: friend,
    category: state.form.category,
    menu: state.form.menu.trim(),
    note: state.form.note.trim(),
    address: state.form.address.trim(),
    lat: state.form.lat || null, 
    lng: state.form.lng || null,
    visited: state.form.visited,
    createdAt: new Date().toLocaleDateString('ja-JP')
  };

  toast('保存中...');
  
  // Supabaseにデータ追加
  const { data, error } = await supabase.from('memos').insert([memo]).select();
  
  if (error) {
    console.error('Supabase insert error:', error);
    toast('保存に失敗しました');
    return;
  }

  if (data && data.length > 0) {
    state.memos = [data[0], ...state.memos];
    state.friends = [...new Set(state.memos.map(m => m.friend).filter(Boolean))];
    state.form = { name:'', friend:'', friendNew:'', category:'その他', menu:'', note:'', address:'', lat:null, lng:null, visited:false };
    _addFormEl = null;
    state.view = 'list';
    toast('📝 保存しました！');
    render();
  }
}

async function toggleVisited(id) {
  const memo = state.memos.find(m => m.id === id);
  if (!memo) return;
  const newStatus = !memo.visited;

  // 画面上は先に切り替える(楽観的UI)
  state.memos = state.memos.map(m => m.id === id ? { ...m, visited: newStatus } : m);
  render();

  // Supabaseを更新
  const { error } = await supabase.from('memos').update({ visited: newStatus }).eq('id', id);
  if (error) {
    console.error('Supabase update error:', error);
    toast('更新に失敗しました');
    // 失敗したら元に戻す
    state.memos = state.memos.map(m => m.id === id ? { ...m, visited: memo.visited } : m);
    render();
  }
}

async function deleteMemo(id) {
  if (!confirm('このメモを削除しますか？')) return;

  toast('削除中...');

  // Supabaseから削除
  const { error } = await supabase.from('memos').delete().eq('id', id);
  if (error) {
    console.error('Supabase delete error:', error);
    toast('削除に失敗しました');
    return;
  }

  state.memos = state.memos.filter(m => m.id !== id);
  state.friends = [...new Set(state.memos.map(m => m.friend).filter(Boolean))];
  state.view = 'list';
  toast('🗑 削除しました');
  render();
}

// ── CSV EXPORT ──
function exportCSV() {
  if (state.memos.length === 0) {
    toast('出力するデータがありません');
    return;
  }
  
  const headers = ['店名', '友達', 'カテゴリ', 'メニュー', 'メモ', '住所', '行ったか', '登録日'];
  const rows = state.memos.map(m => [
    `"${(m.name || '').replace(/"/g, '""')}"`,
    `"${(m.friend || '').replace(/"/g, '""')}"`,
    `"${(m.category || '').replace(/"/g, '""')}"`,
    `"${(m.menu || '').replace(/"/g, '""')}"`,
    `"${(m.note || '').replace(/"/g, '""')}"`,
    `"${(m.address || '').replace(/"/g, '""')}"`,
    m.visited ? 'はい' : 'いいえ',
    m.createdAt
  ]);
  
  const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'tomodachi-meshi_data.csv';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// ── HELPERS ──
function getFriendColor(name, friends) {
  const idx = friends.indexOf(name);
  return FRIEND_COLORS[(idx >= 0 ? idx : friends.length) % FRIEND_COLORS.length];
}
function mapEmbedUrl(addr) {
  return `https://maps.google.com/maps?q=${encodeURIComponent(addr)}&output=embed&z=16`;
}
function mapLinkUrl(name, addr) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+' '+addr)}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── OpenStreetMap API ──
async function apiSearch(query) {
  const p = new URLSearchParams({ q: query, format: 'json', addressdetails: 1, limit: 8, countrycodes: 'jp' });
  const res = await fetch(`https://nominatim.openstreetmap.org/search?${p}`, { headers: { 'Accept-Language': 'ja' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.map(p => ({
    name: p.name || p.display_name.split(',')[0],
    address: p.display_name,
    lat: p.lat,
    lng: p.lon,
    category: '施設・店舗'
  }));
}

async function apiNearby(ll) {
  const [lat, lon] = ll.split(',');
  const query = `[out:json][timeout:10];(node["amenity"~"restaurant|cafe|fast_food|bar|pub|bbq"](around:800,${lat},${lon}););out 20;`;
  const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: query });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return (data.elements || []).filter(p => p.tags && p.tags.name).map(p => ({
      name: p.tags.name,
      address: '周辺の店舗',
      lat: p.lat,
      lng: p.lon,
      category: p.tags.amenity === 'cafe' ? 'カフェ' : '飲食店'
    }));
}

function getLocation() {
  return new Promise((res, rej) => {
    if (!navigator.geolocation) { rej('ブラウザが位置情報に対応していません'); return; }
    navigator.geolocation.getCurrentPosition(
      p => { const ll = `${p.coords.latitude},${p.coords.longitude}`; state.userLL = ll; res(ll); },
      e => rej('位置情報を取得できません（設定を確認してください）')
    );
  });
}

// ── ACTIONS ──
function setState(patch) {
  if (patch.view && patch.view !== 'add') _addFormEl = null;
  Object.assign(state, patch);
  render();
}

function setFormField(key, val) {
  state.form = { ...state.form, [key]: val };
  render();
}

async function handleNameInput(val) {
  state.form = { ...state.form, name: val, address: '', lat: null, lng: null };
  state.apiError = '';
  state.apiStatus = '';
  clearTimeout(sugTimer);

  if (val.length < 2) { 
    state.suggestions = []; 
    state.showSug = false; 
    if (state.view === 'add') patchAddForm(); else render(); 
    return; 
  }

  state.apiStatus = '検索中...';
  if (state.view === 'add') patchAddForm(); else render();

  sugTimer = setTimeout(async () => {
    try {
      let results = await apiSearch(val);
      state.suggestions = results;
      state.showSug = results.length > 0;
      state.apiStatus = results.length > 0 ? `${results.length}件見つかりました` : '候補が見つかりませんでした';
      state.apiError = '';
    } catch(e) {
      state.apiError = 'API接続エラー: ' + e.message;
      state.apiStatus = '';
      state.suggestions = [];
      state.showSug = false;
    }
    if (state.view === 'add') patchAddForm(); else render();
  }, 400);
}

function pickSuggestion(s) {
  state.form = { ...state.form, name: s.name, address: s.address, lat: s.lat, lng: s.lng };
  state.suggestions = [];
  state.showSug = false;
  state.apiStatus = '';
  if (_addFormEl) {
    _addFormEl._refs.nameInput.value = s.name;
    patchAddForm();
  } else render();
}

async function loadNearby() {
  state.nearbyLoading = true;
  state.nearbyError = '';
  render();
  try {
    let ll = state.userLL;
    if (!ll) ll = await getLocation();
    state.nearby = await apiNearby(ll);
    if (state.nearby.length === 0) state.nearbyError = '近くの飲食店が見つかりませんでした';
  } catch(e) {
    state.nearbyError = e.toString();
    state.nearby = [];
  }
  state.nearbyLoading = false;
  render();
}

function addFromNearby(place) {
  state.form = { ...state.form, name: place.name, address: place.address, lat: place.lat, lng: place.lng };
  _addFormEl = null;
  state.view = 'add';
  render();
}

// ── RENDER HELPERS ──
function filteredMemos() {
  return state.memos.filter(m => {
    if (state.filter.friend && m.friend !== state.filter.friend) return false;
    if (state.filter.visited === 'visited' && !m.visited) return false;
    if (state.filter.visited === 'notyet' && m.visited) return false;
    if (state.filter.search) {
      const q = state.filter.search;
      if (![m.name, m.menu, m.friend, m.address].some(v => v && v.includes(q))) return false;
    }
    return true;
  });
}

function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'cls') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') el.innerHTML = v;
    else if (v !== null && v !== undefined && v !== false) el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function badge(visited) {
  return h('span', {
    cls: 'badge',
    style: `background:${visited ? '#5DBB63' : '#aaa'}`
  }, visited ? '✅ 行った' : '📍 未訪問');
}

// ── RENDER ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (state.view === 'nearby') { app.append(renderNearby()); return; }
  if (state.view === 'add')    { app.append(renderAdd());    return; }
  if (state.view === 'detail') { app.append(renderDetail()); return; }
  app.append(renderList());
}

// LIST
function renderList() {
  const memos = filteredMemos();
  const noyet = state.memos.filter(m => !m.visited).length;

  const header = h('div', {cls:'header'},
    h('div', {},
      h('div', {cls:'header-title'}, '🍽 友メシ'),
      h('div', {cls:'header-sub'}, `まだ行ってない：${noyet}件`)
    ),
    h('div', {cls:'header-actions'},
      h('button', {cls:'btn btn-gray btn-sm', onClick: exportCSV}, '📄 CSV'),
      h('button', {cls:'btn btn-teal btn-sm', onClick: () => { setState({view:'nearby'}); }}, '📍 近く'),
      h('button', {cls:'btn btn-primary btn-sm', onClick: () => { setState({view:'add'}); }}, '＋ 追加')
    )
  );

  const searchEl = h('input', {
    cls:'search-input', placeholder:'🔍 店名・友達・住所で検索...', value: state.filter.search,
    onInput: e => { state.filter.search = e.target.value; render(); }
  });

  const friendSel = h('select', {
    cls:'filter-select',
    onChange: e => { state.filter.friend = e.target.value; render(); }
  },
    h('option', {value:''}, '全員'),
    ...state.friends.map(fr => {
      const opt = h('option', {value:fr}, fr);
      if (state.filter.friend === fr) opt.selected = true;
      return opt;
    })
  );

  const visitedSel = h('select', {
    cls:'filter-select',
    onChange: e => { state.filter.visited = e.target.value; render(); }
  },
    ...[['all','全部'],['notyet','未訪問'],['visited','行った']].map(([v,l]) => {
      const opt = h('option', {value:v}, l);
      if (state.filter.visited === v) opt.selected = true;
      return opt;
    })
  );

  const filters = h('div', {cls:'filter-bar'},
    searchEl,
    h('div', {cls:'filter-row'}, friendSel, visitedSel)
  );

  const listEl = h('div', {cls:'list scroll-area'});
  
  if (state.isLoadingData) {
    listEl.append(h('div', {cls:'empty'}, '☁️ データを読み込み中...'));
  } else if (memos.length === 0) {
    listEl.append(h('div', {cls:'empty'}, state.memos.length === 0
      ? '＋ ボタンで\n友達のおすすめを追加しよう！'
      : '該当するメモがありません'));
  } else {
    for (const m of memos) {
      const color = getFriendColor(m.friend, state.friends);
      const card = h('div', {
        cls:'card',
        style:`border-left-color:${color};opacity:${m.visited?0.6:1}`,
        onClick: () => { state.selected = m.id; state.view = 'detail'; render(); }
      },
        h('div', {style:'display:flex;justify-content:space-between;align-items:flex-start'},
          h('div', {style:'flex:1;min-width:0'},
            h('div', {cls:'card-cat'}, m.category),
            h('div', {cls:'card-title'}, m.name),
            m.menu ? h('div', {cls:'card-sub'}, '🍽 ' + m.menu) : null,
            m.address ? h('div', {cls:'card-addr'}, '📍 ' + m.address) : null,
          ),
          h('span', {cls:'badge', style:`background:${m.visited?'#5DBB63':'#bbb'};margin-left:8px;flex-shrink:0`},
            m.visited ? '行った✓' : '未訪問')
        ),
        h('div', {cls:'card-row'},
          h('span', {cls:'friend-tag', style:`background:${color}`}, '👤 ' + m.friend),
          m.address ? h('span', {style:'font-size:11px;color:var(--teal)'}, '🗺 地図あり') : null
        )
      );
      listEl.append(card);
    }
  }

  const wrap = h('div', {style:'display:flex;flex-direction:column;min-height:100vh'}, header, filters, listEl);
  return wrap;
}

// ADD
let _addFormEl = null;

function buildAddForm() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;min-height:100vh';

  const header = h('div', {cls:'header'},
    h('button', {cls:'btn-back', onClick: () => { _addFormEl = null; setState({view:'list'}); }}, '← 戻る'),
    h('span', {cls:'header-title'}, '新しいメモ')
  );
  wrap.append(header);

  const body = document.createElement('div');
  body.className = 'form-body scroll-area';
  wrap.append(body);

  body.append(lbl('お店の名前 *'));
  const sugWrap = document.createElement('div');
  sugWrap.className = 'sug-wrap';
  const nameInput = document.createElement('input');
  nameInput.className = 'form-input';
  nameInput.placeholder = '2文字以上入力すると候補が出ます';
  nameInput.autocomplete = 'off';
  nameInput.value = state.form.name;
  nameInput.addEventListener('input', e => handleNameInput(e.target.value));
  nameInput.addEventListener('focus', () => { if (state.suggestions.length > 0) patchAddForm(); });
  nameInput.addEventListener('blur', () => setTimeout(() => { state.showSug = false; patchAddForm(); }, 200));
  sugWrap.append(nameInput);
  const sugBox = document.createElement('div'); 
  sugWrap.append(sugBox);
  body.append(sugWrap);

  const statusEl = document.createElement('div');
  body.append(statusEl);

  const addrEl = document.createElement('div');
  body.append(addrEl);

  body.append(lbl('教えてくれた友達 *'));
  const chipRow = document.createElement('div');
  chipRow.className = 'chip-row';
  body.append(chipRow);
  const friendInput = document.createElement('input');
  friendInput.className = 'form-input';
  friendInput.placeholder = '新しい友達の名前を入力';
  friendInput.value = state.form.friendNew;
  friendInput.addEventListener('input', e => {
    state.form = {...state.form, friendNew: e.target.value, friend:''};
    patchAddForm();
  });
  body.append(friendInput);

  body.append(lbl('カテゴリ'));
  const catSel = document.createElement('select');
  catSel.className = 'form-input';
  CATEGORIES.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; catSel.append(o); });
  catSel.value = state.form.category;
  catSel.addEventListener('change', e => { state.form = {...state.form, category: e.target.value}; });
  body.append(catSel);

  body.append(lbl('おすすめメニュー'));
  const menuInput = document.createElement('input');
  menuInput.className = 'form-input';
  menuInput.placeholder = '例：担々麺、チャーハン';
  menuInput.value = state.form.menu;
  menuInput.addEventListener('input', e => { state.form = {...state.form, menu: e.target.value}; });
  body.append(menuInput);

  body.append(lbl('メモ・コメント'));
  const noteTA = document.createElement('textarea');
  noteTA.className = 'form-textarea';
  noteTA.placeholder = '例：辛さ調節できる、夜は混む';
  noteTA.value = state.form.note;
  noteTA.addEventListener('input', e => { state.form = {...state.form, note: e.target.value}; });
  body.append(noteTA);

  const visitedLabel = document.createElement('label');
  visitedLabel.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:10px;font-size:14px;color:#555;cursor:pointer';
  const visitedCb = document.createElement('input');
  visitedCb.type = 'checkbox';
  visitedCb.checked = state.form.visited;
  visitedCb.addEventListener('change', e => { state.form = {...state.form, visited: e.target.checked}; });
  visitedLabel.append(visitedCb, 'もう行った');
  body.append(visitedLabel);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary btn-full';
  saveBtn.style.marginTop = '20px';
  saveBtn.textContent = '💾 保存する';
  saveBtn.addEventListener('click', () => {
    state.form.name    = nameInput.value.trim() || state.form.name;
    state.form.menu    = menuInput.value;
    state.form.note    = noteTA.value;
    state.form.friendNew = friendInput.value;
    state.form.category  = catSel.value;
    state.form.visited   = visitedCb.checked;
    addMemo(); // Supabaseへ送信
  });
  body.append(saveBtn);

  wrap._refs = { nameInput, sugBox, statusEl, addrEl, chipRow, friendInput, catSel, menuInput, noteTA, visitedCb, saveBtn };
  return wrap;
}

function patchAddForm() {
  if (!_addFormEl) return;
  const { nameInput, sugBox, statusEl, addrEl, chipRow, saveBtn } = _addFormEl._refs;
  const f = state.form;

  sugBox.innerHTML = '';
  if (state.showSug && state.suggestions.length > 0) {
    sugBox.className = 'sug-box';
    state.suggestions.forEach(s => {
      const item = h('div', {cls:'sug-item', onMousedown: () => pickSuggestion(s)},
        h('div', {cls:'sug-name'}, s.name),
        s.address ? h('div', {cls:'sug-addr'}, s.address) : null,
        s.category ? h('div', {cls:'sug-cat'}, s.category) : null,
      );
      sugBox.append(item);
    });
  } else {
    sugBox.className = '';
  }

  if (state.apiError) {
    statusEl.className = 'err-box'; statusEl.textContent = state.apiError;
  } else if (state.apiStatus) {
    statusEl.className = 'api-status'; statusEl.textContent = '🔍 ' + state.apiStatus;
  } else {
    statusEl.className = ''; statusEl.textContent = '';
  }

  if (f.address) {
    addrEl.className = 'addr-confirm'; addrEl.textContent = '✅ 住所自動入力済み：' + f.address;
  } else {
    addrEl.className = 'api-status'; addrEl.textContent = '候補を選ぶと住所が自動で入ります';
  }

  chipRow.innerHTML = '';
  state.friends.forEach(fr => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (f.friend === fr && !f.friendNew ? ' active' : '');
    btn.textContent = fr;
    btn.addEventListener('click', () => {
      state.form = {...state.form, friend: fr, friendNew: ''};
      _addFormEl._refs.friendInput.value = '';
      patchAddForm();
    });
    chipRow.append(btn);
  });

  const friend = f.friendNew.trim() || f.friend;
  const canSave = f.name.trim() && friend;
  saveBtn.style.opacity = canSave ? '1' : '0.4';
}

function renderAdd() {
  if (!_addFormEl) _addFormEl = buildAddForm();
  patchAddForm();
  return _addFormEl;
}

function lbl(text) {
  const el = document.createElement('label');
  el.className = 'form-label';
  el.textContent = text;
  return el;
}

// DETAIL
function renderDetail() {
  const m = state.memos.find(x => x.id === state.selected);
  if (!m) { state.view = 'list'; render(); return h('div'); }
  const color = getFriendColor(m.friend, state.friends);

  const detailCard = h('div', {cls:'detail-card', style:`border-color:${color}`},
    h('div', {style:'display:flex;justify-content:space-between;align-items:flex-start'},
      h('div', {},
        h('div', {style:'font-size:11px;color:var(--muted)'}, m.category),
        h('div', {cls:'detail-name'}, m.name),
      ),
      badge(m.visited)
    ),
    h('span', {cls:'friend-tag', style:`background:${color};margin-top:10px`}, '👤 ' + m.friend + ' より'),
    m.menu ? h('div', {cls:'detail-section'},
      h('div', {cls:'detail-label'}, '🍽 おすすめメニュー'),
      h('div', {cls:'detail-value'}, m.menu)
    ) : null,
    m.note ? h('div', {cls:'detail-section'},
      h('div', {cls:'detail-label'}, '📝 メモ'),
      h('div', {cls:'detail-value'}, m.note)
    ) : null,
    m.address ? h('div', {cls:'detail-section'},
      h('div', {cls:'detail-label'}, '📍 住所'),
      h('div', {cls:'detail-row'},
        h('div', {cls:'detail-value', style:'font-size:14px'}, m.address),
        h('a', {cls:'map-open-btn', href: mapLinkUrl(m.name, m.address), target:'_blank', rel:'noopener noreferrer'}, 'マップで開く')
      )
    ) : null,
    h('div', {style:'font-size:11px;color:var(--muted);margin-top:14px'}, '登録日: ' + m.createdAt)
  );

  const mapFrame = m.address ? h('div', {cls:'map-frame'},
    h('iframe', {
      title:'map', src: mapEmbedUrl(m.address),
      width:'100%', height:'220',
      style:'border:none;display:block',
      loading:'lazy', referrerpolicy:'no-referrer-when-downgrade'
    })
  ) : null;

  const actions = h('div', {cls:'action-row'},
    h('button', {
      cls:`btn btn-full ${m.visited ? 'btn-gray' : 'btn-green'}`,
      style:'flex:1',
      onClick: () => { toggleVisited(m.id); }
    }, m.visited ? '未訪問に戻す' : '✅ 行った！'),
    h('button', {
      cls:'btn btn-red btn-full',
      style:'flex:1',
      onClick: () => deleteMemo(m.id)
    }, '🗑 削除')
  );

  return h('div', {style:'display:flex;flex-direction:column;min-height:100vh'},
    h('div', {cls:'header'},
      h('button', {cls:'btn-back', onClick: () => setState({view:'list'})}, '← 戻る'),
      h('span', {cls:'header-title'}, '詳細')
    ),
    h('div', {cls:'scroll-area'}, detailCard, mapFrame, actions)
  );
}

// NEARBY
function renderNearby() {
  const loadBtn = h('button', {
    cls:'btn btn-teal btn-full',
    style:'margin-bottom:14px',
    onClick: loadNearby
  }, state.nearbyLoading ? '取得中...' : '🔍 現在地から探す');

  const listEl = h('div', {});
  if (state.nearbyError) listEl.append(h('div', {cls:'err-box'}, state.nearbyError));
  if (!state.nearbyLoading && !state.nearbyError && state.nearby.length === 0) {
    listEl.append(h('div', {cls:'empty'}, 'ボタンを押すと\n近くの飲食店が表示されます'));
  }
  for (const p of state.nearby) {
    const card = h('div', {cls:'card', style:'border-left-color:var(--teal);margin-bottom:11px'},
      h('div', {style:'display:flex;justify-content:space-between;align-items:flex-start;gap:10px'},
        h('div', {style:'flex:1;min-width:0'},
          h('div', {cls:'card-cat'}, p.category),
          h('div', {cls:'card-title'}, p.name),
          p.address ? h('div', {cls:'card-addr'}, '📍 ' + p.address) : null,
        ),
        h('button', {
          cls:'btn btn-primary btn-sm',
          style:'flex-shrink:0',
          onClick: () => addFromNearby(p)
        }, '＋ メモ')
      )
    );
    listEl.append(card);
  }

  return h('div', {style:'display:flex;flex-direction:column;min-height:100vh'},
    h('div', {cls:'header'},
      h('button', {cls:'btn-back', onClick: () => setState({view:'list'})}, '← 戻る'),
      h('span', {cls:'header-title'}, '📍 近くの飲食店')
    ),
    h('div', {cls:'scroll-area', style:'padding:16px'}, loadBtn, listEl)
  );
}

// ── INIT ──
// ページを開いた瞬間にSupabaseからデータを取得する
loadMemos();
</script>
</body>
</html>
